<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档查看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1714;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #252130;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .toolbar-title {
      font-size: 0.95rem;
      color: #e8e5df;
      font-weight: 500;
    }
    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: rgba(109,91,158,0.15);
      border: 1px solid rgba(109,91,158,0.3);
      color: #a78bfa;
      border-radius: 9999px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .toolbar-btn:hover {
      background: rgba(109,91,158,0.25);
      border-color: rgba(109,91,158,0.5);
    }
    .toolbar-hint {
      font-size: 0.78rem;
      color: #6b6760;
    }
    .viewer-container {
      flex: 1;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Overlay to discourage right-click save */
    .viewer-container::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: transparent;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title" id="docTitle">文档查看</span>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="toolbar-hint">仅供在线查看</span>
      <a href="javascript:history.back()" class="toolbar-btn">← 返回</a>
    </div>
  </div>
  <div class="viewer-container" id="viewer">
    <iframe id="pdfFrame" width="100%" height="100%" style="border:none;"></iframe>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file') || '';
      const title = params.get('title') || '文档查看';
      document.getElementById('docTitle').textContent = title;
      const frame = document.getElementById('pdfFrame');
      frame.src = file + '#toolbar=0&navpanes=0';

      // Prevent common download shortcuts
      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S' || e.key === 'p' || e.key === 'P')) {
          e.preventDefault();
          return false;
        }
      });
    })();
  </script>
</body>
</html>
